<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 1: Asal Sayılar</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --theme-color: #b100ff; --dark-bg: #050508; --card-bg: #0d001a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; }
        .neon-text { font-family: 'Orbitron', sans-serif; color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color); }
        .content-box { background: var(--card-bg); border: 1px solid var(--theme-color); padding: 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(177, 0, 255, 0.1); }
        .explanation { font-size: 1.15rem; line-height: 1.8; color: #e0e0e0; font-weight: 400; }
        .calc-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border-left: 4px solid var(--theme-color); margin: 20px 0; font-family: 'Orbitron', sans-serif; color: #fff; }
        .example-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .example-item { border: 1px solid var(--theme-color); padding: 15px; text-align: center; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; transition: 0.3s; }
        .example-item:hover { background: var(--theme-color); color: #000; }
        .btn-nav { border: 1px solid var(--theme-color); color: var(--theme-color); padding: 10px 20px; border-radius: 5px; text-decoration: none; transition: 0.3s; }
        .btn-nav:hover { background: var(--theme-color); color: #000; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5" data-aos="fade-down">
            <a href="index.html" class="btn-nav"><i class="fas fa-home"></i> Ana Menü</a>
            <span class="text-secondary font-monospace">SEVİYE 1 / 5</span>
            <a href="armstrong.html" class="btn-nav">Sıradaki: Armstrong <i class="fas fa-chevron-right"></i></a>
        </div>
        <div class="row align-items-center">
            <div class="col-lg-5 text-center mb-4" data-aos="fade-right">
                <i class="fas fa-divide" style="font-size: 10rem; color: var(--theme-color);"></i>
                <h1 class="neon-text mt-4 display-4">ASAL SAYILAR</h1>
            </div>
            <div class="col-lg-7" data-aos="fade-left">
                <div class="content-box">
                    <h3 class="neon-text fs-4 mb-3">Tanım ve Özellikler</h3>
                    <p class="explanation">Asal sayılar, sadece 1'e ve kendisine tam bölünebilen, 1'den büyük doğal sayılardır. Diğer tüm tam sayıların temelini oluştururlar.</p>
                    <div class="calc-box">Örnek Analiz: 13 sayısı sadece 1x13 olarak çarpanlarına ayrılabilir.</div>
                    <div class="example-grid">
                        <div class="example-item">2</div><div class="example-item">3</div><div class="example-item">5</div>
                        <div class="example-item">7</div><div class="example-item">11</div><div class="example-item">13</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script><script>AOS.init();</script>
</body>
</html>
