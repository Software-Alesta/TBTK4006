<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 5: Palindrom</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --theme-color: #00ccff; --dark-bg: #00080a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; }
        .mirror-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 50px 0; }
        .mirror-text { font-family: 'Orbitron', sans-serif; font-size: 5rem; color: var(--theme-color); }
        .mirror-text.reflected { transform: scaleX(-1); opacity: 0.5; filter: blur(2px); }
        .btn-nav { border: 1px solid var(--theme-color); color: var(--theme-color); background: transparent; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
        .btn-nav:hover { background: var(--theme-color); color: #000; }
    </style>
</head>
<body>
    <div class="container py-5 text-center">
        <div class="d-flex justify-content-between mb-5">
            <a href="fibonacci.html" class="btn-nav">Geri</a>
            <span class="neon-text">SON SEVİYE</span>
            <a href="alistirma.html" class="btn-nav bg-info text-dark">ARENAYA GİRİŞ <i class="fas fa-sword"></i></a>
        </div>
        <h1 class="neon-text">PALİNDROM SAYILAR</h1>
        <div class="mirror-container">
            <div class="mirror-text">12321</div>
            <div class="mirror-text reflected">12321</div>
        </div>
        <p class="fs-5">Düzden ve tersten okunuşu aynı olan, zamanın ve mekanın ötesindeki simetrik sayılar.</p>
    </div>
</body>
</html>
