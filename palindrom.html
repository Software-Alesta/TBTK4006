<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 5: Palindrom Sayılar</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root { --theme-color: #00e5ff; --dark-bg: #00090a; --card-bg: #00151a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; background-image: radial-gradient(circle at center, rgba(0, 229, 255, 0.05), transparent 70%); }
        .neon-text { font-family: 'Orbitron', sans-serif; color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color), 0 0 20px var(--theme-color); }
        .content-box { background: var(--card-bg); border-left: 4px solid var(--theme-color); padding: 30px; border-radius: 0 15px 15px 0; box-shadow: 10px 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .content-box::after { content: '\f021'; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: -20px; bottom: -30px; font-size: 150px; color: rgba(0, 229, 255, 0.05); z-index: 0; }
        .mirror-effect { font-family: 'Orbitron', sans-serif; font-size: 3rem; letter-spacing: 10px; color: var(--theme-color); }
        .reflected { transform: scaleX(-1); opacity: 0.3; display: block; margin-top: -10px; }
        .btn-nav { border: 1px solid var(--theme-color); color: var(--theme-color); background: transparent; padding: 10px 20px; border-radius: 5px; text-decoration: none; transition: 0.3s; }
        .btn-nav:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 15px var(--theme-color); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5" data-aos="fade-down">
            <a href="fibonacci.html" class="btn-nav"><i class="fas fa-chevron-left"></i> Geri: Fibonacci</a>
            <span class="text-secondary font-monospace">SEVİYE 5 / 5</span>
            <a href="alistirma.html" class="btn-nav" style="background: var(--theme-color); color: #000;">ARENAYA GİR <i class="fas fa-sword"></i></a>
        </div>

        <div class="row align-items-center">
            <div class="col-lg-5 text-center mb-4" data-aos="fade-right">
                <i class="fas fa-sync-alt" style="font-size: 10rem; color: var(--theme-color); text-shadow: 0 0 40px var(--theme-color);"></i>
                <h1 class="neon-text mt-4 display-4">PALİNDROM</h1>
                <p class="text-muted mt-2">Zamanın Aynasındaki Sayılar</p>
            </div>
            <div class="col-lg-7" data-aos="fade-left">
                <div class="content-box text-center">
                    <h3 class="neon-text fs-4 mb-4">Simetrinin Büyüsü</h3>
                    <div class="mb-4">
                        <span class="mirror-effect">12321</span>
                        <span class="mirror-effect reflected">12321</span>
                    </div>
                    <p style="position: relative; z-index: 1;">Baştan ve sondan okunuşu aynı olan bu sayılar, dijital dünyada veri bütünlüğü kontrollerinde ve simetri çalışmalarında sıkça karşımıza çıkar.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
