<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 5: Palindrom Sayılar</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --theme-color: #00e5ff; --dark-bg: #00090a; --card-bg: #00151a; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; }
        .neon-text { font-family: 'Orbitron', sans-serif; color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color); }
        .content-box { background: var(--card-bg); border: 2px solid var(--theme-color); padding: 40px; border-radius: 15px; }
        .explanation { font-size: 1.2rem; line-height: 1.9; color: #ffffff; }
        .calc-box { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; border-left: 5px solid var(--theme-color); margin: 25px 0; font-family: 'Orbitron', sans-serif; color: #00e5ff; }
        .example-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .example-item { border: 2px solid var(--theme-color); padding: 20px; text-align: center; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; transition: 0.4s; background: rgba(0, 229, 255, 0.05); }
        .example-item:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 20px var(--theme-color); }
        .btn-nav { border: 2px solid var(--theme-color); color: var(--theme-color); padding: 12px 25px; border-radius: 8px; text-decoration: none; font-family: 'Orbitron', sans-serif; }
        .btn-nav:hover { background: var(--theme-color); color: #000; }
    </style>
</head>
<body>
    <div class="container py-5">
        <nav class="d-flex justify-content-between align-items-center mb-5" data-aos="fade-down">
            <a href="fibonacci.html" class="btn-nav"><i class="fas fa-chevron-left me-2"></i> GERİ</a>
            <span class="text-secondary fw-bold">SEVİYE 05 / 05</span>
            <a href="alistirma.html" class="btn-nav" style="background: var(--theme-color); color: #000;">ARENAYA GİR <i class="fas fa-sword ms-2"></i></a>
        </nav>

        <div class="row align-items-center">
            <div class="col-lg-5 text-center mb-5" data-aos="zoom-in">
                <i class="fas fa-arrows-left-right" style="font-size: 12rem; color: var(--theme-color); filter: drop-shadow(0 0 20px var(--theme-color));"></i>
                <h1 class="neon-text mt-4 display-4 fw-bold">PALİNDROM</h1>
                <p class="text-secondary mt-3 fs-5">Sayısal Ayna Simetrisi</p>
            </div>
            <div class="col-lg-7" data-aos="fade-left">
                <div class="content-box">
                    <h2 class="neon-text fs-3 mb-4"><i class="fas fa-sync-alt me-2"></i> Tanım</h2>
                    <p class="explanation">
                        Soldan sağa ve sağdan sola okunuşu aynı olan sayılara palindrom sayı denir. Basamakları tersten yazıldığında değerini kaybetmezler.
                    </p>
                    <div class="calc-box text-center">
                        <span style="font-size: 2rem; letter-spacing: 15px;">12321</span> <br>
                        <i class="fas fa-exchange-alt my-2"></i> <br>
                        <span style="font-size: 2rem; letter-spacing: 15px; opacity: 0.5;">12321</span>
                    </div>
                    <h3 class="text-light mt-4 fs-5 mb-3">Simetrik 6 Örnek:</h3>
                    <div class="example-grid">
                        <div class="example-item">121</div><div class="example-item">505</div><div class="example-item">1331</div>
                        <div class="example-item">4884</div><div class="example-item">12321</div><div class="example-item">99999</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
