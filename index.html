<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Python ile Sayıların Gizemli Dünyası</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:#0d1117;
    color:#c9d1d9;
    font-family: 'Inter', sans-serif;
    overflow:hidden;
}

/* Ortalama */
.screen {
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:1s;
}

/* Başlık */
h1 {
    font-size:2.5rem;
    color:#58a6ff;
}

p {
    max-width:600px;
    opacity:0.8;
}

/* Buton */
.btn {
    margin-top:20px;
    padding:12px 25px;
    border:1px solid #58a6ff;
    background:transparent;
    color:#58a6ff;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    background:#58a6ff;
    color:black;
}

/* Fade animasyon */
.fade-out {
    opacity:0;
    transform:translateY(-20px);
}

.fade-in {
    opacity:1;
}

/* Temalar */
.asal { background:#161b22; }
.armstrong { background:#1a1f2b; }
.mukemmel { background:#141a1f; }
.fibonacci { background:#1b1b1b; }
.palindrom { background:#121212; }

</style>
</head>

<body>

<div id="app" class="screen"></div>

<script>

let step = 0;

// SAHNELER
const scenes = [

    // 0 - ANA MENÜ
    {
        title: "Python ile Sayıların Gizemli Dünyası",
        text: "Bilinmeyen bir diyara adım atmaya hazır mısın?",
        button: "Gizemli Dünyaya Katıl"
    },

    // 1 - HOŞ GELDİN
    {
        title: "Sayıların Diyarına Hoş Geldin",
        text: "Bu dünyada sayılar sadece rakam değildir... Her biri bir kimliğe sahiptir."
    },

    // 2 - ANLATIM
    {
        title: "Bu Diyarın Özelleri Var",
        text: "Bazı sayılar diğerlerinden farklıdır. Güçlüdür, nadirdir, özeldir."
    },

    // 3 - ASAL
    {
        title: "Asal Sayılar",
        text: "Sadece kendine ve 1'e bölünür. Saf ve bölünemezdir.",
        class: "asal"
    },

    // 4 - ARMSTRONG
    {
        title: "Armstrong Sayılar",
        text: "Kendi basamaklarının gücünü taşır.",
        class: "armstrong"
    },

    // 5 - MÜKEMMEL
    {
        title: "Mükemmel Sayılar",
        text: "Bölenlerinin toplamı kendisine eşittir.",
        class: "mukemmel"
    },

    // 6 - FIBONACCI
    {
        title: "Fibonacci Sayıları",
        text: "Doğanın ritmini takip eder.",
        class: "fibonacci"
    },

    // 7 - PALİNDROM
    {
        title: "Palindrom Sayılar",
        text: "Başlangıç ve son aynı... zaman gibi.",
        class: "palindrom"
    }

];

// EKRAN BAS
function render() {
    let s = scenes[step];

    document.body.className = s.class || "";

    document.getElementById("app").innerHTML = `
        <h1>${s.title}</h1>
        <p>${s.text}</p>
        ${s.button ? `<button class="btn" onclick="next()">${s.button}</button>` : ""}
    `;
}

// SONRAKİ
function next() {
    let app = document.getElementById("app");

    app.classList.add("fade-out");

    setTimeout(() => {
        step++;
        render();
        app.classList.remove("fade-out");
        app.classList.add("fade-in");
    }, 700);
}

// TIKLAYARAK DEVAM
document.body.addEventListener("click", (e) => {
    if(step > 0 && step < scenes.length - 1){
        next();
    }
});

// BAŞLAT
render();

</script>

</body>
</html>
