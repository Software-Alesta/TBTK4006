<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sayıların Şifresi</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #111;
    color: #00ff88;
    font-family: Consolas;
}
.card {
    background: #1a1a1a;
    border: 1px solid #00ff88;
}
.btn-custom {
    background: black;
    color: #00ff88;
    border: 1px solid #00ff88;
}
</style>
</head>

<body class="container text-center mt-4">

<h1 class="mb-4">Sayıların Şifresi</h1>

<div class="mb-3">
    <button class="btn btn-custom" onclick="egitim()">Eğitim</button>
    <button class="btn btn-custom" onclick="oyun()">Oyun</button>
</div>

<div id="icerik"></div>

<script>
// --- PUANLAR ---
const puanlar = {
    asal: 3,
    armstrong: 5,
    mukemmel: 6,
    fibonacci: 2,
    palindrom: 2
};

// --- ÖZEL SAYILAR ---
function asal(n){
    if(n < 2) return false;
    for(let i=2;i<=Math.sqrt(n);i++){
        if(n % i === 0) return false;
    }
    return true;
}

function armstrong(n){
    let s = n.toString();
    let toplam = 0;
    for(let i of s){
        toplam += Math.pow(parseInt(i), s.length);
    }
    return toplam === n;
}

function mukemmel(n){
    if(n < 2) return false;
    let toplam = 0;
    for(let i=1;i<n;i++){
        if(n % i === 0) toplam += i;
    }
    return toplam === n;
}

function fibonacci(n){
    let a=0,b=1;
    while(b<n){
        let temp=b;
        b=a+b;
        a=temp;
    }
    return b===n || n===0;
}

function palindrom(n){
    let s = n.toString();
    return s === s.split("").reverse().join("");
}

// --- EĞİTİM ---
function egitim(){
document.getElementById("icerik").innerHTML = `
<div class="card p-3">
<h3>Eğitim Modu</h3>

<p><b>Asal:</b> Sadece 1 ve kendisine bölünür.</p>
<p><b>Armstrong:</b> 153 gibi sayılar.</p>
<p><b>Mükemmel:</b> 6, 28</p>
<p><b>Fibonacci:</b> 0,1,1,2,3...</p>
<p><b>Palindrom:</b> 121 gibi</p>

<input id="test" class="form-control mt-2" placeholder="Sayı gir">
<button class="btn btn-custom mt-2" onclick="testEt()">Test Et</button>

<p id="sonuc" class="mt-3"></p>
</div>
`;
}

function testEt(){
let n = parseInt(document.getElementById("test").value);
let sonuc = [];

if(asal(n)) sonuc.push("Asal");
if(armstrong(n)) sonuc.push("Armstrong");
if(mukemmel(n)) sonuc.push("Mükemmel");
if(fibonacci(n)) sonuc.push("Fibonacci");
if(palindrom(n)) sonuc.push("Palindrom");

document.getElementById("sonuc").innerText =
    sonuc.length ? "Bu sayı: " + sonuc.join(", ") : "Özel sayı değil";
}

// --- OYUN ---
let kullanilan = [];
let p1 = 0, p2 = 0, tur = 0;

function oyun(){
kullanilan = [];
p1 = 0;
p2 = 0;
tur = 0;

document.getElementById("icerik").innerHTML = `
<div class="card p-3">
<h3>2 Kişilik Oyun</h3>

<p id="sira">Oyuncu 1</p>

<input id="sayi" class="form-control" placeholder="Sayı gir">
<button class="btn btn-custom mt-2" onclick="oyna()">Gönder</button>

<p id="bilgi" class="mt-2"></p>
<p id="puan"></p>
</div>
`;
}

function oyna(){
let n = parseInt(document.getElementById("sayi").value);

if(kullanilan.includes(n)){
document.getElementById("bilgi").innerText = "Bu sayı kullanıldı!";
return;
}

kullanilan.push(n);

let puan = 0;
let bulunan = [];

if(asal(n)){puan+=puanlar.asal; bulunan.push("Asal");}
if(armstrong(n)){puan+=puanlar.armstrong; bulunan.push("Armstrong");}
if(mukemmel(n)){puan+=puanlar.mukemmel; bulunan.push("Mükemmel");}
if(fibonacci(n)){puan+=puanlar.fibonacci; bulunan.push("Fibonacci");}
if(palindrom(n)){puan+=puanlar.palindrom; bulunan.push("Palindrom");}

if(tur%2===0) p1+=puan;
else p2+=puan;

document.getElementById("bilgi").innerText =
`${n} → ${bulunan.join(", ") || "Özel değil"} (+${puan})`;

tur++;

document.getElementById("puan").innerText =
`Oyuncu1: ${p1} | Oyuncu2: ${p2}`;

if(tur>=10){
document.getElementById("sira").innerText =
p1>p2 ? "Oyuncu 1 kazandı" :
p2>p1 ? "Oyuncu 2 kazandı" : "Berabere";
return;
}

document.getElementById("sira").innerText =
tur%2===0 ? "Oyuncu 1" : "Oyuncu 2";
}
</script>

</body>
</html>
