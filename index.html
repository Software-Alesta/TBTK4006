<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python ile Sayıların Gizemli Dünyası</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background:#0a0f1c;
    color:#e5e7eb;
}

/* ARKA PLAN SAYILAR */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
    opacity:0.15;
}

/* GENEL */
.screen {
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:40px;
}

/* BAŞLIK */
.title {
    font-family:'Orbitron';
    font-size:3rem;
    color:#7dd3fc;
}

/* SLOGAN */
.subtitle {
    font-size:1.2rem;
    opacity:0.8;
}

/* BUTON */
.btn-neon {
    margin-top:30px;
    padding:12px 30px;
    border:1px solid #7dd3fc;
    color:#7dd3fc;
    background:transparent;
    transition:0.3s;
}
.btn-neon:hover {
    background:#7dd3fc;
    color:black;
}

/* GEÇİŞ */
.fade {animation:fade 1s;}
@keyframes fade {from{opacity:0} to{opacity:1}}

/* BÜYÜK YAZILAR */
.big-text {
    font-size:2rem;
    margin:10px 0;
}

/* ASAL SAYFA */
.asal-layout {
    display:flex;
    justify-content:space-around;
    width:100%;
}

.card-box {
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    width:30%;
}

/* ARMSTRONG */
.center-glow {
    font-size:2.5rem;
    text-shadow:0 0 20px #a78bfa;
}

/* FIBONACCI spiral hissi */
.fibo {
    font-size:1.5rem;
    letter-spacing:5px;
}

/* PALİNDROM */
.mirror {
    transform:scaleX(-1);
    display:inline-block;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="app" class="screen"></div>

<script>
// ARKA PLAN SAYILAR
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nums = "0123456789";
let drops = Array(100).fill(1);

function draw(){
    ctx.fillStyle="rgba(10,15,28,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#7dd3fc";
    ctx.font="15px monospace";

    for(let i=0;i<drops.length;i++){
        let text = nums[Math.floor(Math.random()*nums.length)];
        ctx.fillText(text,i*15,drops[i]*15);

        if(drops[i]*15 > canvas.height && Math.random()>0.95)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,60);

// SAHNELER
let step=0;

function render(){
let html="";

// 0 ANA
if(step===0){
html=`
<h1 class="title fade">Python ile Sayıların Gizemli Dünyası</h1>
<p class="subtitle fade">Sayılar düşündüğünden daha fazlasıdır.</p>
<button class="btn-neon" onclick="next()">Dünyaya Giriş Yap</button>
`;
}

// 1 HİKAYE
if(step===1){
html=`
<div class="fade">
<p class="big-text">Sayıların diyarına hoş geldin</p>
<p class="big-text">Bu diyarda her sayı ayrı bir kimliğe sahiptir</p>
<p class="big-text">Özel olanlar... diğerlerinden farklıdır</p>
<p class="big-text">Onları keşfetmeye hazır mısın?</p>
</div>
`;
}

// 2 ASAL
if(step===2){
html=`
<h1>Asal Sayılar</h1>
<div class="asal-layout mt-4">
<div class="card-box">Sadece 1 ve kendisine bölünür</div>
<div class="card-box">Matematiğin temel yapı taşıdır</div>
<div class="card-box">Örnek: 2,3,5,7,11</div>
</div>
`;
}

// 3 ARMSTRONG
if(step===3){
html=`
<h1>Armstrong Sayılar</h1>
<p class="center-glow mt-4">153 = 1³ + 5³ + 3³</p>
<p>Kendi basamaklarının gücünü taşır</p>
`;
}

// 4 FIBO
if(step===4){
html=`
<h1>Fibonacci</h1>
<p class="fibo mt-4">0 → 1 → 1 → 2 → 3 → 5 → 8</p>
<p>Doğanın matematiksel ritmi</p>
`;
}

// 5 PALİNDROM
if(step===5){
html=`
<h1>Palindrom</h1>
<p class="mt-4">121 → <span class="mirror">121</span></p>
<p>Aynı başlangıç, aynı son</p>
`;
}

document.getElementById("app").innerHTML=html;
}

function next(){
step++;
render();
}

document.body.addEventListener("click",()=>{
if(step>0 && step<5){
step++;
render();
}
});

render();
</script>

</body>
</html>
