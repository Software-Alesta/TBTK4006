<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bölüm 4: Fibonacci</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --theme-color: #00ff88; --dark-bg: #000a05; --card-bg: #001a0d; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .neon-text { font-family: 'Orbitron', sans-serif; color: var(--theme-color); text-shadow: 0 0 10px var(--theme-color); }
        .content-box { background: var(--card-bg); border: 2px solid var(--theme-color); padding: 40px; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }
        .explanation { font-size: 1.2rem; line-height: 1.9; color: #ffffff; }
        .calc-box { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px; border-left: 5px solid var(--theme-color); margin: 25px 0; font-family: 'Orbitron', sans-serif; color: #00ff88; }
        .example-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .example-item { border: 2px solid var(--theme-color); padding: 20px; text-align: center; border-radius: 12px; font-family: 'Orbitron', sans-serif; font-size: 1.6rem; transition: 0.4s; }
        .example-item:hover { background: var(--theme-color); color: #000; box-shadow: 0 0 20px var(--theme-color); }
        .btn-nav { border: 2px solid var(--theme-color); color: var(--theme-color); padding: 12px 25px; border-radius: 8px; text-decoration: none; font-family: 'Orbitron', sans-serif; }
        .btn-nav:hover { background: var(--theme-color); color: #000; }

        /* MOBİL UYUMLULUK */
        @media (max-width: 768px) {
            .example-grid { grid-template-columns: repeat(2, 1fr); }
            .content-box { padding: 25px 15px; }
            .btn-nav { padding: 8px 12px; font-size: 0.8rem; }
        }
        @media (max-width: 480px) {
            .example-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <nav class="d-flex justify-content-between align-items-center mb-5" data-aos="fade-down">
            <a href="mukemmel.html" class="btn-nav"><i class="fas fa-chevron-left me-2"></i> GERİ</a>
            <span class="text-secondary fw-bold text-center mx-2" style="font-size: 0.9rem;">SEVİYE 04 / 05</span>
            <a href="palindrom.html" class="btn-nav">İLERİ <i class="fas fa-chevron-right ms-2"></i></a>
        </nav>

        <div class="row align-items-center">
            <div class="col-lg-5 text-center mb-5" data-aos="zoom-in">
                <i class="fas fa-leaf" style="font-size: 12rem; color: var(--theme-color); filter: drop-shadow(0 0 20px var(--theme-color));"></i>
                <h1 class="neon-text mt-4 display-4 fw-bold">FIBONACCI</h1>
                <p class="text-secondary mt-3 fs-5">Doğanın Altın Zinciri</p>
            </div>
            <div class="col-lg-7" data-aos="fade-left">
                <div class="content-box">
                    <h2 class="neon-text fs-3 mb-4"><i class="fas fa-link me-2"></i> Tanım</h2>
                    <p class="explanation">
                        Fibonacci serisi, her sayının kendisinden önceki iki sayının toplamı olduğu matematiksel bir dizidir. Bu oran doğada bitki ve galaksi sarmallarında görülür.
                    </p>
                    <div class="calc-box">
                        <i class="fas fa-plus-circle me-2"></i> KURAL: 5'ten Sonra Gelen Sayı <br>
                        3 + 5 = 8
                    </div>
                    <h3 class="text-light mt-4 fs-5 mb-3">Diziden 6 Eleman:</h3>
                    <div class="example-grid">
                        <div class="example-item">1</div><div class="example-item">2</div><div class="example-item">3</div>
                        <div class="example-item">5</div><div class="example-item">8</div><div class="example-item">13</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
