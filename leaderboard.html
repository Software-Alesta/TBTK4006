<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liderlik Tablosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050508; color: #fff; font-family: 'Poppins', sans-serif; padding: 50px 0; }
        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px #00e5ff; color: #00e5ff; text-align: center; margin-bottom: 40px; }
        .lb-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .table { color: #fff; }
        .top-rank { background: rgba(0, 229, 255, 0.1); color: #00e5ff; font-weight: bold; }
        .current-user { border: 2px solid #ff0055 !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 5px #ff0055; } 50% { box-shadow: 0 0 20px #ff0055; } 100% { box-shadow: 0 0 5px #ff0055; } }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="neon-title">ARENA ŞAMPİYONLARI</h1>
        
        <div class="lb-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>SIRA</th>
                        <th>OYUNCU ADI</th>
                        <th>PUAN</th>
                        <th>TARİH</th>
                    </tr>
                </thead>
                <tbody id="lbBody">
                    <!-- Veriler JS ile buraya gelecek -->
                </tbody>
            </table>

            <div class="text-center mt-5">
                <a href="oyun.html" class="btn btn-outline-info me-3"><i class="fas fa-play me-2"></i>Tekrar Oyna</a>
                <a href="index.html" class="btn btn-outline-light"><i class="fas fa-home me-2"></i>Ana Sayfa</a>
            </div>
        </div>
    </div>

    <script>
        const lbBody = document.getElementById('lbBody');
        let data = JSON.parse(localStorage.getItem('leaderboard')) || [];

        // Veriyi puana göre sırala
        data.sort((a,b) => b.score - a.score);

        if(data.length === 0) {
            lbBody.innerHTML = '<tr><td colspan="4" class="text-center">Henüz kayıtlı skor bulunamadı. İlk sen ol!</td></tr>';
        } else {
            data.forEach((entry, index) => {
                const row = document.createElement('tr');
                if(index === 0) row.className = 'top-rank';
                
                row.innerHTML = `
                    <td>#${index + 1}</td>
                    <td>${entry.name}</td>
                    <td>${entry.score}</td>
                    <td>${entry.date}</td>
                `;
                lbBody.appendChild(row);
            });
        }
    </script>
</body>
</html>
