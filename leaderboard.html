<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayılar Diyarı: Liderlik Tablosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00e5ff; --dark-bg: #050508; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        /* Sayfa Giriş Efekti */
        .page-reveal { animation: reveal 1s ease forwards; }
        @keyframes reveal { from { opacity: 0; clip-path: inset(0 100% 0 0); } to { opacity: 1; clip-path: inset(0 0 0 0); } }

        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--neon-cyan); color: var(--neon-cyan); text-align: center; margin-top: 50px; }
        
        .lb-card { 
            max-width: 700px; margin: 40px auto; background: rgba(255,255,255,0.03); 
            padding: 40px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.2);
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .table { color: #fff; border-color: rgba(255,255,255,0.1); }
        .table thead { font-family: 'Orbitron'; color: var(--neon-cyan); font-size: 0.9rem; }
        .rank-gold { color: #ffd700; font-weight: bold; }
        
        /* Alistirma.html ve Arena.html ile uyumlu buton stili */
        .back-link {
            text-decoration: none; font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; transition: 0.4s; padding: 10px 25px;
            border: 1px solid var(--neon-cyan); border-radius: 50px;
            background: rgba(0, 229, 255, 0.05); color: #fff;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .back-link:hover { 
            background: var(--neon-cyan); color: #000; 
            box-shadow: 0 0 30px var(--neon-cyan); transform: scale(1.05);
        }

        /* MOBİL UYUMLULUK */
        @media (max-width: 768px) {
            .lb-card { padding: 20px; margin: 20px 10px; }
            .back-link { padding: 8px 18px; font-size: 0.75rem; width: 100%; }
            .d-flex.gap-3 { flex-direction: column; }
        }
    </style>
</head>
<body class="page-reveal">

    <div class="container">
        <h1 class="neon-title">ARENA ŞAMPİYONLARI</h1>
        
        <div class="lb-card">
            <table class="table">
                <thead>
                    <tr>
                        <th class="text-center">SIRA</th>
                        <th>OYUNCU</th>
                        <th class="text-end">PUAN</th>
                    </tr>
                </thead>
                <tbody id="lbBody"></tbody>
            </table>

            <div class="d-flex justify-content-center gap-3 mt-5">
                <a href="arena.html" class="back-link"><i class="fas fa-play me-2"></i> TEKRAR OYNA</a>
                <a href="index.html" class="back-link" style="border-color: #fff;"><i class="fas fa-home me-2"></i> SAYILAR DiYARINA DÖN</a>
            </div>
        </div>
    </div>

    <script>
        const lbBody = document.getElementById('lbBody');
        
        function loadLeaderboard() {
            let data = JSON.parse(localStorage.getItem('leaderboard')) || [];
            
            // Puana göre sıralama
            data.sort((a,b) => b.score - a.score);

            lbBody.innerHTML = '';

            if(data.length === 0) {
                lbBody.innerHTML = '<tr><td colspan="3" class="text-center text-secondary py-4">Arena henüz sessiz...</td></tr>';
            } else {
                data.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    const rankClass = index === 0 ? 'rank-gold' : '';
                    row.innerHTML = `
                        <td class="text-center ${rankClass}">#${index + 1}</td>
                        <td class="${rankClass}">${entry.name.toUpperCase()}</td>
                        <td class="text-end fw-bold" style="color: var(--neon-cyan)">${entry.score}</td>
                    `;
                    lbBody.appendChild(row);
                });
            }
        }

        // --- YÖNETİCİ KONSOL FONKSİYONLARI ---

        // İsme göre silmek için konsola yaz: sil("isim")
        window.sil = function(targetName) {
            let data = JSON.parse(localStorage.getItem('leaderboard')) || [];
            const initialLength = data.length;
            data = data.filter(entry => entry.name.toLowerCase() !== targetName.toLowerCase());
            if (data.length < initialLength) {
                localStorage.setItem('leaderboard', JSON.stringify(data));
                console.log(`%c ✅ ${targetName} silindi.`, "color: #00e5ff; font-weight: bold;");
                loadLeaderboard();
            } else {
                console.error(`❌ "${targetName}" bulunamadı.`);
            }
        };

        // Sıraya göre silmek için konsola yaz: siradanSil(1)
        window.siradanSil = function(rank) {
            let data = JSON.parse(localStorage.getItem('leaderboard')) || [];
            data.sort((a,b) => b.score - a.score);
            if (rank > 0 && rank <= data.length) {
                const removed = data.splice(rank - 1, 1);
                localStorage.setItem('leaderboard', JSON.stringify(data));
                console.log(`%c ✅ #${rank} sıradaki ${removed[0].name} silindi.`, "color: #00e5ff; font-weight: bold;");
                loadLeaderboard();
            } else {
                console.error("❌ Geçersiz sıra!");
            }
        };

        // Sayfa yüklendiğinde tabloyu doldur
        loadLeaderboard();
    </script>
</body>
</html>
