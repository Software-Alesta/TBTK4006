<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayılar Diyarı: Düello</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0055; --neon-cyan: #00e5ff; --dark-bg: #050508; --neon-red: #ff3333; --neon-yellow: #ffea00; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        #pageLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 10000; display: flex; justify-content: center; align-items: center; transition: 1s ease; }
        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--neon-pink); color: var(--neon-pink); }
        
        #modeSelect, #nicknamePanel, #gameArea, #resultScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Sağdaki Sayı Akışı */
        .number-log { position: fixed; right: 30px; top: 100px; width: 300px; height: 70vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 10px; scroll-behavior: smooth; }
        .log-item { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--neon-cyan); padding: 10px; border-radius: 5px; animation: slideIn 0.4s ease-out; }
        .log-item.p2-item { border-left-color: var(--neon-yellow); }
        
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .game-input { background: transparent; border: 3px solid var(--neon-pink); color: #fff; font-size: 4rem; text-align: center; width: 350px; border-radius: 15px; font-family: 'Orbitron'; outline: none; transition: 0.3s; }
        .game-input:focus { box-shadow: 0 0 30px var(--neon-pink); }
        
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: var(--neon-red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .player-indicator { font-family: 'Orbitron'; font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 10px; transition: 0.5s; }
        .active-p1 { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .active-p2 { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }

        .hidden { display: none !important; }
        .final-list { max-height: 250px; overflow-y: auto; width: 100%; max-width: 550px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body onload="startPage()">

    <div id="pageLoader"><h1 class="neon-title" style="font-size: 3rem;">DÜELLO BAŞLIYOR...</h1></div>

    <!-- Mod Seçimi -->
    <div id="modeSelect">
        <h1 class="neon-title mb-5 text-center">ARENA: İKİ KİŞİLİK</h1>
        <div class="btn btn-outline-info p-5" onclick="showNickname()" style="border-width: 2px; border-radius: 20px;">
            <i class="fas fa-swords fa-4x mb-3"></i><h3>SIRALI DÜELLO (5 Hamle)</h3>
        </div>
    </div>

    <!-- Takma Ad Girişi -->
    <div id="nicknamePanel" class="hidden text-center">
        <h2 class="neon-title mb-4">OYUNCU ADLARINI GİRİN</h2>
        <input type="text" id="p1Nick" class="game-input fs-4 mb-3" placeholder="1. Oyuncu Adı" maxlength="12">
        <input type="text" id="p2Nick" class="game-input fs-4" placeholder="2. Oyuncu Adı" maxlength="12">
        <div id="nickWarn" class="mt-3 text-danger fw-bold" style="height: 25px;"></div>
        <button class="btn btn-outline-light mt-4 px-5 py-2" onclick="startDuel()">SAVAŞI BAŞLAT</button>
    </div>

    <!-- Oyun Alanı -->
    <div id="gameArea" class="hidden">
        <div class="position-absolute top-0 start-50 translate-middle-x mt-4 text-center">
            <div id="turnIndicator" class="player-indicator active-p1 font-weight-bold">SIRA: OYUNCU 1</div>
            <h4 class="text-secondary">HAMLE SÜRESİ: <span id="moveTimer" style="color: var(--neon-red);">5</span>s</h4>
            <div class="d-flex gap-5 mt-2">
                <div>P1: <span id="p1Score">0</span></div>
                <div>HAMLE: <span id="currentMove">1</span>/10</div>
                <div>P2: <span id="p2Score">0</span></div>
            </div>
        </div>
        
        <div class="number-log" id="numberLog"></div>
        
        <input type="number" id="gameInput" class="game-input" onkeypress="handleKeyPress(event)">
        <div id="warningMsg" class="mt-3 text-danger fw-bold" style="height: 30px; font-size: 1.2rem;"></div>
    </div>

    <!-- Sonuç Ekranı -->
    <div id="resultScreen" class="hidden text-center">
        <h1 class="neon-title" style="font-size: 3.5rem;" id="winnerTitle">KAZANAN: -</h1>
        <div class="h4 mt-3">
            <span id="resP1Name"></span>: <span id="resP1Score" class="text-info">0</span> | 
            <span id="resP2Name"></span>: <span id="resP2Score" class="text-warning">0</span>
        </div>
        <div class="final-list" id="finalList"></div>
        <div class="d-flex gap-3">
            <button onclick="location.reload()" class="btn btn-info px-4 py-2">TEKRAR OYNA</button>
            <a href="index.html" class="btn btn-outline-light px-4 py-2">ANA SAYFA</a>
        </div>
    </div>

    <script>
        let scores = {p1: 0, p2: 0}, 
            names = {p1: "", p2: ""},
            activePlayer = 'p1',
            totalMoves = 0, // Toplam 10 hamle (5 per player)
            moveTimeLeft = 5,
            usedNumbers = [],
            entries = [],
            moveInterval;

        function startPage() {
            setTimeout(() => { 
                document.getElementById('pageLoader').style.opacity = '0'; 
                setTimeout(() => document.getElementById('pageLoader').style.display = 'none', 1000); 
            }, 1000);
        }

        function showNickname() {
            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('nicknamePanel').classList.remove('hidden');
        }

        function startDuel() {
            names.p1 = document.getElementById('p1Nick').value.trim() || "Oyuncu 1";
            names.p2 = document.getElementById('p2Nick').value.trim() || "Oyuncu 2";
            
            document.getElementById('nicknamePanel').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            updateUI();
            startMoveTimer();
        }

        function startMoveTimer() {
            moveTimeLeft = 5;
            document.getElementById('moveTimer').innerText = moveTimeLeft;
            document.getElementById('gameInput').focus();
            
            clearInterval(moveInterval);
            moveInterval = setInterval(() => {
                moveTimeLeft--;
                document.getElementById('moveTimer').innerText = moveTimeLeft;
                if(moveTimeLeft <= 0) {
                    processNumber(null); // Süre biterse boş hamle
                }
            }, 1000);
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") {
                const val = parseInt(document.getElementById('gameInput').value);
                const inputEl = document.getElementById('gameInput');
                
                if(isNaN(val)) return;

                if(usedNumbers.includes(val)) {
                    showWarning("BU SAYI KULLANILDI!");
                } else {
                    processNumber(val);
                    usedNumbers.push(val);
                }
                inputEl.value = "";
            }
        }

        function processNumber(n) {
            clearInterval(moveInterval);
            let p = 0, types = [];

            if(n !== null) {
                if (isPerfect(n)) { p += 5; types.push("Mükemmel"); }
                if (isArmstrong(n)) { p += 4; types.push("Armstrong"); }
                if (isPrime(n)) { p += 3; types.push("Asal"); }
                if (isFibonacci(n)) { p += 2; types.push("Fibonacci"); }
                if (isPalindrome(n)) { p += 1; types.push("Palindrom"); }
            }

            if(types.length === 0 && n !== null) types.push("Özel Değil");
            if(n === null) types.push("Süre Bitti");

            scores[activePlayer] += p;
            entries.push({player: names[activePlayer], num: n || "PAS", type: types.join(", "), score: p, playerClass: activePlayer});
            
            addLog(n || "PAS", types.join(", "), p, activePlayer);
            
            totalMoves++;
            if(totalMoves >= 10) {
                finishDuel();
            } else {
                activePlayer = (activePlayer === 'p1') ? 'p2' : 'p1';
                updateUI();
                startMoveTimer();
            }
        }

        function updateUI() {
            document.getElementById('p1Score').innerText = scores.p1;
            document.getElementById('p2Score').innerText = scores.p2;
            document.getElementById('currentMove').innerText = totalMoves + 1;
            
            const indicator = document.getElementById('turnIndicator');
            indicator.innerText = `SIRA: ${names[activePlayer].toUpperCase()}`;
            indicator.className = `player-indicator ${activePlayer === 'p1' ? 'active-p1' : 'active-p2'}`;
            
            const input = document.getElementById('gameInput');
            input.style.borderColor = activePlayer === 'p1' ? 'var(--neon-cyan)' : 'var(--neon-yellow)';
        }

        function showWarning(msg) {
            const el = document.getElementById('warningMsg');
            const input = document.getElementById('gameInput');
            el.innerText = msg;
            input.classList.add('shake');
            setTimeout(() => { el.innerText = ""; input.classList.remove('shake'); }, 1000);
        }

        function addLog(n, typeStr, p, pClass) {
            const log = document.getElementById('numberLog');
            const item = document.createElement('div');
            item.className = `log-item ${pClass === 'p2' ? 'p2-item' : ''}`;
            item.innerHTML = `<strong>${n}</strong> <small>(${names[pClass]})</small><br><small>${typeStr}</small> <span class="float-end">+${p}</span>`;
            log.prepend(item);
        }

        // Matematiksel Kontroller
        const isPrime = n => { if (n < 2) return false; for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false; return true; };
        const isArmstrong = n => { let s = n.toString(), l = s.length, sum = 0; for (let c of s) sum += Math.pow(parseInt(c), l); return sum === n; };
        const isPerfect = n => { let sum = 0; for (let i = 1; i < n; i++) if (n % i === 0) sum += i; return sum === n && n !== 0; };
        const isPalindrome = n => n.toString() === n.toString().split('').reverse().join('');
        const isFibonacci = n => { const isSquare = x => Math.sqrt(x) % 1 === 0; return isSquare(5*n*n + 4) || isSquare(5*n*n - 4); };

        function finishDuel() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            let winTitle = "";
            if(scores.p1 > scores.p2) winTitle = `KAZANAN: ${names.p1}`;
            else if(scores.p2 > scores.p1) winTitle = `KAZANAN: ${names.p2}`;
            else winTitle = "BERABERE!";
            
            document.getElementById('winnerTitle').innerText = winTitle;
            document.getElementById('resP1Name').innerText = names.p1;
            document.getElementById('resP2Name').innerText = names.p2;
            document.getElementById('resP1Score').innerText = scores.p1;
            document.getElementById('resP2Score').innerText = scores.p2;

            const list = document.getElementById('finalList');
            entries.forEach(e => {
                list.innerHTML += `<div class="p-2 border-bottom border-secondary text-start">
                    <span class="${e.playerClass === 'p1' ? 'text-info' : 'text-warning'} font-weight-bold">${e.player}</span> -> 
                    <b>${e.num}</b> (${e.type}) <span class="float-end">+${e.score}</span>
                </div>`;
            });
        }
    </script>
</body>
</html>
