<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayılar Diyarı: Oyun Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0055; --neon-cyan: #00e5ff; --dark-bg: #050508; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--neon-pink); color: var(--neon-pink); }
        
        /* Mod Seçimi Paneli */
        #modeSelect, #nicknamePanel, #gameArea { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .mode-card { 
            background: rgba(255,255,255,0.05); border: 2px solid var(--neon-cyan); 
            padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; width: 300px; text-align: center;
        }
        .mode-card:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--neon-cyan); background: var(--neon-cyan); color: #000; }
        
        /* Puan Tablosu */
        .puan-label { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.8rem; }
        .score-item { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 5px; }

        /* Oyun İçi Elementler */
        .game-input { 
            background: transparent; border: 3px solid var(--neon-pink); color: #fff; 
            font-size: 4rem; text-align: center; width: 300px; border-radius: 15px; font-family: 'Orbitron';
        }
        .timer-circle { font-size: 5rem; font-family: 'Orbitron'; color: var(--neon-cyan); }
        
        /* Sarsılma Efekti (Hatalı Giriş) */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: red !important; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Puan Tablosu (Sadece Oyun Başlayınca Çıkar) -->
    <div id="scoreLegend" class="puan-label hidden">
        <h6 class="text-center border-bottom pb-2 mb-2">PUAN TABLOSU</h6>
        <div class="score-item"><span>Palindrom:</span> <span>1 P</span></div>
        <div class="score-item"><span>Fibonacci:</span> <span>2 P</span></div>
        <div class="score-item"><span>Asal:</span> <span>3 P</span></div>
        <div class="score-item"><span>Armstrong:</span> <span>4 P</span></div>
        <div class="score-item"><span>Mükemmel:</span> <span>5 P</span></div>
    </div>

    <!-- 1. MOD SEÇİMİ -->
    <div id="modeSelect">
        <h1 class="neon-title mb-5">MODUNU SEÇ</h1>
        <div class="d-flex gap-4">
            <div class="mode-card" onclick="showNickname()">
                <i class="fas fa-user fa-4x mb-3"></i>
                <h3>TEK KİŞİLİK</h3>
            </div>
            <div class="mode-card" style="opacity: 0.5; border-color: #555;">
                <i class="fas fa-users fa-4x mb-3"></i>
                <h3>İKİ KİŞİLİK</h3>
                <small>(Pek Yakında)</small>
            </div>
        </div>
    </div>

    <!-- 2. TAKMA AD GİRİŞİ -->
    <div id="nicknamePanel" class="hidden">
        <h2 class="neon-title mb-4">KİMLİĞİNİ BELİRLE</h2>
        <input type="text" id="nickInput" class="game-input fs-2" placeholder="Takma Adın..." style="width: 400px;">
        <button class="btn btn-outline-info mt-4 px-5" onclick="startGameFlow()">ARENAYA GİR</button>
    </div>

    <!-- 3. SAYAC VE BİLGİLENDİRME -->
    <div id="gameFlow" class="hidden text-center">
        <h1 id="flowText" class="neon-title mb-5">HAZIR MISIN?</h1>
        <div id="countdown" class="timer-circle">5</div>
        <p class="mt-4 text-secondary">30 saniye içinde bildiğin tüm özel sayıları gir!<br>Unutma, her sayı sadece bir kez puan getirir.</p>
    </div>

    <!-- 4. ASIL OYUN ALANI -->
    <div id="gameArea" class="hidden">
        <div class="position-absolute top-0 start-50 translate-middle-x mt-4">
            <h2 class="text-secondary font-monospace">SÜRE: <span id="gameTimer" style="color: var(--neon-cyan);">30</span>s</h2>
            <h2 class="text-secondary font-monospace">PUAN: <span id="currentScore" style="color: var(--neon-pink);">0</span></h2>
        </div>
        <input type="number" id="gameInput" class="game-input" autofocus onkeypress="handleKeyPress(event)">
        <p id="gameMsg" class="mt-3 text-warning"></p>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let usedNumbers = [];
        let nickname = "";

        function showNickname() {
            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('nicknamePanel').classList.remove('hidden');
        }

        function startGameFlow() {
            nickname = document.getElementById('nickInput').value || "Oyuncu";
            document.getElementById('nicknamePanel').classList.add('hidden');
            document.getElementById('gameFlow').classList.remove('hidden');

            let count = 5;
            let timer = setInterval(() => {
                count--;
                document.getElementById('countdown').innerText = count;
                if(count <= 0) {
                    clearInterval(timer);
                    actualGameStart();
                }
            }, 1000);
        }

        function actualGameStart() {
            document.getElementById('gameFlow').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('scoreLegend').classList.remove('hidden');
            document.getElementById('gameInput').focus();

            let gameTick = setInterval(() => {
                timeLeft--;
                document.getElementById('gameTimer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(gameTick);
                    finishGame();
                }
            }, 1000);
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") {
                const val = parseInt(document.getElementById('gameInput').value);
                const inputEl = document.getElementById('gameInput');
                const msgEl = document.getElementById('gameMsg');

                if(isNaN(val)) return;

                if(usedNumbers.includes(val)) {
                    inputEl.classList.add('shake');
                    msgEl.innerText = "Bu sayıyı zaten kullandın!";
                    setTimeout(() => inputEl.classList.remove('shake'), 500);
                } else {
                    calculatePoints(val);
                    usedNumbers.push(val);
                    msgEl.innerText = "";
                }
                inputEl.value = "";
            }
        }

        function calculatePoints(n) {
            let p = 0;
            // Puanlama mantığı (En yüksek olandan başlar)
            if (isPerfect(n)) p = 5;
            else if (isArmstrong(n)) p = 4;
            else if (isPrime(n)) p = 3;
            else if (isFibonacci(n)) p = 2;
            else if (isPalindrome(n)) p = 1;

            score += p;
            document.getElementById('currentScore').innerText = score;
        }

        // Matematiksel Kontroller (Alıştırma sayfasındaki mantıkla aynı)
        const isPrime = n => { if (n < 2) return false; for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false; return true; };
        const isArmstrong = n => { let s = n.toString(), l = s.length, sum = 0; for (let c of s) sum += Math.pow(parseInt(c), l); return sum === n; };
        const isPerfect = n => { let sum = 0; for (let i = 1; i < n; i++) if (n % i === 0) sum += i; return sum === n && n !== 0; };
        const isPalindrome = n => n.toString() === n.toString().split('').reverse().join('');
        const isFibonacci = n => {
            const isSquare = x => Math.sqrt(x) % 1 === 0;
            return isSquare(5*n*n + 4) || isSquare(5*n*n - 4);
        };

        function finishGame() {
            // Leaderboard için veriyi kaydet (LocalStorage kullanıyoruz ki kalıcı olsun)
            let leaderBoard = JSON.parse(localStorage.getItem('leaderboard')) || [];
            leaderBoard.push({name: nickname, score: score, date: new Date().toLocaleDateString()});
            localStorage.setItem('leaderboard', JSON.stringify(leaderBoard));
            
            alert(`Süre doldu! Toplam Puanın: ${score}. Leaderboard'a yönlendiriliyorsun.`);
            window.location.href = "leaderboard.html";
        }
    </script>
</body>
</html>
