<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayılar Diyarı: Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0055; --neon-cyan: #00e5ff; --dark-bg: #050508; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        
        /* Geçiş Efekti */
        #pageLoader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); z-index: 10000; display: flex; justify-content: center; align-items: center; transition: 1s ease; }
        
        .neon-title { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 15px var(--neon-pink); color: var(--neon-pink); }
        
        #modeSelect, #nicknamePanel, #gameArea, #resultScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Sağdaki Sayı Akışı */
        .number-log { position: fixed; right: 30px; top: 100px; width: 250px; height: 70vh; overflow: hidden; display: flex; flex-direction: column-reverse; gap: 10px; }
        .log-item { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--neon-cyan); padding: 10px; border-radius: 5px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Oyun Elementleri */
        .game-input { background: transparent; border: 3px solid var(--neon-pink); color: #fff; font-size: 4rem; text-align: center; width: 350px; border-radius: 15px; font-family: 'Orbitron'; outline: none; transition: 0.3s; }
        .game-input:focus { box-shadow: 0 0 30px var(--neon-pink); }
        
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ff3333 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* Sonuç Ekranı Animasyonu */
        .fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .final-list { max-height: 300px; overflow-y: auto; width: 100%; max-width: 500px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 10px; margin: 20px 0; }
        .hidden { display: none !important; }
        .puan-tag { float: right; font-weight: bold; color: var(--neon-cyan); }
    </style>
</head>
<body onload="startPage()">

    <div id="pageLoader"><h1 class="neon-title" style="font-size: 3rem;">ARENA YÜKLENİYOR...</h1></div>

    <!-- MOD SEÇİMİ -->
    <div id="modeSelect">
        <h1 class="neon-title mb-5">MODUNU SEÇ</h1>
        <div class="d-flex gap-4">
            <div class="btn btn-outline-info p-5" onclick="showNickname()" style="border-width: 2px; border-radius: 20px;">
                <i class="fas fa-user fa-4x mb-3"></i><h3>TEK KİŞİLİK</h3>
            </div>
            <div class="btn btn-outline-secondary p-5 disabled" style="border-width: 2px; border-radius: 20px; opacity: 0.5;">
                <i class="fas fa-users fa-4x mb-3"></i><h3>İKİ KİŞİLİK</h3>
            </div>
        </div>
    </div>

    <!-- TAKMA AD -->
    <div id="nicknamePanel" class="hidden text-center">
        <h2 class="neon-title mb-4">TAKMA ADINI GİR</h2>
        <input type="text" id="nickInput" class="game-input fs-2" placeholder="Oyuncu Adı..." maxlength="12">
        <button class="btn btn-outline-light mt-4 px-5 py-2" onclick="startGameFlow()">BAŞLAT</button>
    </div>

    <!-- GERİ SAYIM VE AÇIKLAMA -->
    <div id="gameFlow" class="hidden text-center">
        <h1 class="neon-title mb-4">HAZIRLAN!</h1>
        <p class="text-info mb-4" style="font-family: 'Orbitron'; letter-spacing: 2px;">
            30 saniye içinde bildiğin tüm özel sayıları girerek puan topla!
        </p>
        <div id="countdown" style="font-size: 8rem; color: var(--neon-cyan); font-family: 'Orbitron';">5</div>
    </div>

    <!-- OYUN ALANI -->
    <div id="gameArea" class="hidden">
        <div class="position-absolute top-0 start-50 translate-middle-x mt-4 text-center">
            <h4 class="text-secondary">SÜRE: <span id="gameTimer" style="color: var(--neon-cyan);">30</span>s</h4>
            <h2 class="neon-title">PUAN: <span id="currentScore">0</span></h2>
        </div>
        
        <div class="number-log" id="numberLog"></div>
        
        <input type="number" id="gameInput" class="game-input" onkeypress="handleKeyPress(event)">
        <div id="warningMsg" class="mt-3 text-danger fw-bold" style="height: 30px; font-size: 1.2rem;"></div>
    </div>

    <!-- SONUÇ EKRANI -->
    <div id="resultScreen" class="hidden text-center fade-in-up">
        <h1 class="neon-title" style="font-size: 4rem;">OYUN BİTTİ</h1>
        <h3 class="mt-3"><span id="finalNick"></span>, Toplam Puanın: <span id="finalScore" class="text-info">0</span></h3>
        
        <div class="final-list" id="finalList"></div>

        <div class="d-flex gap-3">
            <a href="leaderboard.html" class="btn btn-info px-4 py-2"><i class="fas fa-trophy me-2"></i>Liderlik Tablosu</a>
            <a href="index.html" class="btn btn-outline-light px-4 py-2"><i class="fas fa-home me-2"></i>Sayılar Diyarı</a>
        </div>
    </div>

    <script>
        let score = 0, timeLeft = 30, usedNumbers = [], nickname = "", entries = [];

        function startPage() {
            setTimeout(() => { 
                document.getElementById('pageLoader').style.opacity = '0'; 
                setTimeout(() => document.getElementById('pageLoader').style.display = 'none', 1000); 
            }, 1000);
        }

        function showNickname() {
            document.getElementById('modeSelect').classList.add('hidden');
            document.getElementById('nicknamePanel').classList.remove('hidden');
        }

        function startGameFlow() {
            nickname = document.getElementById('nickInput').value || "Oyuncu";
            document.getElementById('nicknamePanel').classList.add('hidden');
            document.getElementById('gameFlow').classList.remove('hidden');

            let count = 5;
            let timer = setInterval(() => {
                count--;
                document.getElementById('countdown').innerText = count;
                if(count === 0) { clearInterval(timer); actualGameStart(); }
            }, 1000);
        }

        function actualGameStart() {
            document.getElementById('gameFlow').classList.add('hidden');
            document.getElementById('gameArea').classList.remove('hidden');
            document.getElementById('gameInput').focus();

            let gameTick = setInterval(() => {
                timeLeft--;
                document.getElementById('gameTimer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(gameTick); finishGame(); }
            }, 1000);
        }

        function handleKeyPress(e) {
            if(e.key === "Enter") {
                const val = parseInt(document.getElementById('gameInput').value);
                const inputEl = document.getElementById('gameInput');
                const warnEl = document.getElementById('warningMsg');

                if(isNaN(val)) return;

                if(usedNumbers.includes(val)) {
                    inputEl.classList.add('shake');
                    warnEl.innerText = "BU SAYIYI DAHA ÖNCE GİRDİN!";
                    setTimeout(() => { inputEl.classList.remove('shake'); warnEl.innerText = ""; }, 1000);
                } else {
                    processNumber(val);
                    usedNumbers.push(val);
                }
                inputEl.value = "";
            }
        }

        function processNumber(n) {
            let p = 0, type = "";
            if (isPerfect(n)) { p = 5; type = "Mükemmel"; }
            else if (isArmstrong(n)) { p = 4; type = "Armstrong"; }
            else if (isPrime(n)) { p = 3; type = "Asal"; }
            else if (isFibonacci(n)) { p = 2; type = "Fibonacci"; }
            else if (isPalindrome(n)) { p = 1; type = "Palindrom"; }

            if(p > 0) {
                score += p;
                document.getElementById('currentScore').innerText = score;
                addLog(n, type, p);
                entries.push({n, type, p});
            }
        }

        function addLog(n, type, p) {
            const log = document.getElementById('numberLog');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<strong>${n}</strong> <small>(${type})</small> <span class="puan-tag">+${p}</span>`;
            log.appendChild(item);
        }

        const isPrime = n => { if (n < 2) return false; for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false; return true; };
        const isArmstrong = n => { let s = n.toString(), l = s.length, sum = 0; for (let c of s) sum += Math.pow(parseInt(c), l); return sum === n; };
        const isPerfect = n => { let sum = 0; for (let i = 1; i < n; i++) if (n % i === 0) sum += i; return sum === n && n !== 0; };
        const isPalindrome = n => n.toString() === n.toString().split('').reverse().join('');
        const isFibonacci = n => { const isSquare = x => Math.sqrt(x) % 1 === 0; return isSquare(5*n*n + 4) || isSquare(5*n*n - 4); };

        function finishGame() {
            document.getElementById('gameArea').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('finalNick').innerText = nickname;
            document.getElementById('finalScore').innerText = score;

            const list = document.getElementById('finalList');
            entries.forEach(e => {
                list.innerHTML += `<div class="p-2 border-bottom border-secondary text-start">
                    Sayı: <b>${e.n}</b> | Tür: ${e.type} <span class="float-end text-info">+${e.p} Puan</span>
                </div>`;
            });

            let lb = JSON.parse(localStorage.getItem('leaderboard')) || [];
            lb.push({name: nickname, score: score});
            localStorage.setItem('leaderboard', JSON.stringify(lb));
        }
    </script>
</body>
</html>
